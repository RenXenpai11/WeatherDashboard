<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Weather Dash icon">
	<defs>
		<linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#ffd54f" />
			<stop offset="100%" stop-color="#ff9800" />
		</linearGradient>
		<linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#e3f2fd" />
			<stop offset="100%" stop-color="#90caf9" />
		</linearGradient>
	</defs>

	<rect width="64" height="64" rx="14" fill="#0f172a" />
	<circle cx="24" cy="23" r="11" fill="url(#sun)" />

	<g fill="url(#cloud)">
		<circle cx="35" cy="36" r="10" />
		<circle cx="27" cy="38" r="8" />
		<circle cx="43" cy="38" r="7" />
		<rect x="22" y="36" width="28" height="11" rx="5.5" />
	</g>

	<g stroke="#38bdf8" stroke-width="2.8" stroke-linecap="round">
		<line x1="28" y1="50" x2="25" y2="56" />
		<line x1="36" y1="50" x2="33" y2="56" />
		<line x1="44" y1="50" x2="41" y2="56" />
	</g>
</svg>